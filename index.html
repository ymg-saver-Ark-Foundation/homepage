<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SEA LANTERN C.P.F.</title>

<style>

:root{
  --bg:#08111d;
  --panel:#0f1c2c;
  --gold:#d4af55;
  --text:#ffffff;
  --sub:rgba(255,255,255,0.65);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:Arial,sans-serif;
}


/* =========================
   ログイン画面
========================= */

#login-screen{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login-box{
  width:340px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.12);
  padding:30px;
}

.login-title{
  font-size:22px;
  font-weight:900;
  margin-bottom:8px;
  letter-spacing:.08em;
}

.login-sub{
  color:var(--sub);
  font-size:12px;
  margin-bottom:24px;
  letter-spacing:.15em;
}

.login-box input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  background:#09121d;
  border:1px solid rgba(255,255,255,0.12);
  color:white;
}

.login-box button{
  width:100%;
  padding:12px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  margin-bottom:10px;
}

.google-btn{
  background:white;
}

.email-btn{
  background:var(--gold);
}

hr{
  margin:18px 0;
  border:none;
  border-top:1px solid rgba(255,255,255,0.1);
}


/* =========================
   サイト本体
========================= */

#main-site{
  display:none;
}


/* サイドバー */

#sidebar{
  width:220px;
  height:100vh;
  position:fixed;
  left:0;
  top:0;
  background:#0c1726;
  border-right:1px solid rgba(255,255,255,0.08);
  padding:20px;
}

.sidebar-logo{
  font-size:22px;
  font-weight:900;
  color:var(--gold);
  margin-bottom:30px;
}


/* メイン */

#main{
  margin-left:220px;
  padding:40px;
}

.page-hero{
  position:relative;
  padding:60px;
  background:linear-gradient(
    135deg,
    rgba(255,255,255,0.03),
    rgba(255,255,255,0.01)
  );
  border:1px solid rgba(255,255,255,0.08);
}

.page-hero-watermark{
  position:absolute;
  top:20px;
  right:30px;
  font-size:90px;
  opacity:0.04;
  font-weight:900;
}

.page-eyebrow{
  color:var(--gold);
  font-size:12px;
  letter-spacing:.2em;
  margin-bottom:12px;
}

.page-title{
  font-size:42px;
  font-weight:900;
  margin-bottom:8px;
}

.page-subtitle{
  color:var(--sub);
  letter-spacing:.12em;
}

.page-fiction-note{
  margin-top:12px;
  color:rgba(255,255,255,0.45);
  font-size:11px;
  letter-spacing:.12em;
}

</style>

</head>


<body>


<!-- =========================
     ログイン画面
========================= -->

<div id="login-screen">

  <div class="login-box">

    <div class="login-title">
      SLCPF ACCESS PORTAL
    </div>

    <div class="login-sub">
      AUTHORIZED ACCESS ONLY
    </div>


    <!-- Google -->
    <button class="google-btn" onclick="loginGoogle()">
      Googleでログイン
    </button>

    <hr>


    <!-- メール -->
    <input
      type="email"
      id="email"
      placeholder="Email"
    >

    <input
      type="password"
      id="password"
      placeholder="Password"
    >

    <button class="email-btn" onclick="loginEmail()">
      メールでログイン
    </button>

  </div>

</div>



<!-- =========================
     サイト本体
========================= -->

<div id="main-site">


  <!-- サイドバー -->
  <aside id="sidebar">

    <div class="sidebar-logo">
      SLCPF
    </div>

  </aside>



  <!-- メイン -->
  <div id="main">

    <div class="page-hero">

      <div class="page-hero-watermark">
        SLCPF
      </div>

      <div class="page-eyebrow">
        OFFICIAL PORTAL // SLCPF-PUBLIC-001 // 2098
      </div>

      <div class="page-title">
        SEA LANTERN C.P.F.
      </div>

      <div class="page-subtitle">
        シーランタン 文化保全財団
      </div>

      <div class="page-fiction-note">
        ※本サイトに登場する団体・設定はすべてフィクションです
      </div>

    </div>

  </div>

</div>



<!-- =========================
     Firebase
========================= -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
  getAuth,
  signInWithPopup,
  GoogleAuthProvider,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";



/* Firebase設定 */

const firebaseConfig = {

  apiKey: "ここにapiKey",

  authDomain:
    "ymg-server-ark-foundation.firebaseapp.com",

  projectId:
    "ymg-server-ark-foundation",

  appId:
    "ここにappId"

};



/* 初期化 */

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const provider = new GoogleAuthProvider();



/* Googleログイン */

window.loginGoogle = () => {

  signInWithPopup(auth, provider);

};



/* メールログイン */

window.loginEmail = async () => {

  const email =
    document.getElementById("email").value;

  const password =
    document.getElementById("password").value;

  try {

    await signInWithEmailAndPassword(
      auth,
      email,
      password
    );

  } catch {

    await createUserWithEmailAndPassword(
      auth,
      email,
      password
    );

  }

};



/* ログイン状態 */

onAuthStateChanged(auth, (user) => {

  if (user) {

    document.getElementById("login-screen")
      .style.display = "none";

    document.getElementById("main-site")
      .style.display = "block";

  }

});

</script>

</body>

</html>
